name: Morning Forex Brief

# GitHub cron runs in UTC and has no timezone support, so we schedule BOTH
# 04:00 and 05:00 UTC. The EXPECTED_LOCAL_HOUR=5 guard in the script makes only
# the run that actually lands at 5am UK time post; the other one exits quietly.
#   04:00 UTC = 5am BST (summer)   |   05:00 UTC = 5am GMT (winter)
on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch: {}        # lets you trigger a manual test run from the Actions tab

permissions:
  contents: write              # lets the job save the last message id back to the repo

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency: forex-brief    # never let two runs race on the saved id
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Post the brief
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIMEZONE: Europe/London
          # Only enforce the 5am guard on the automatic schedule. Manual
          # "Run workflow" tests leave it empty, so they always post.
          EXPECTED_LOCAL_HOUR: ${{ github.event_name == 'schedule' && '5' || '' }}
          # Optional overrides:
          # CURRENCIES: "USD,EUR"
          # TRUMP_MAX: "8"
        run: python forex_news_to_discord.py

      # Save the id of the message we just posted back into the repo, so the
      # next run knows which message to delete. This persists reliably across
      # runs (unlike a cache) -- the id is just committed to last_message_id.txt.
      - name: Save last message id
        run: |
          if [ -n "$(git status --porcelain last_message_id.txt)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add last_message_id.txt
            git commit -m "Update last posted message id [skip ci]"
            git push
          else
            echo "No change to last_message_id.txt; nothing to save."
          fi
