name: Morning Forex Brief

# GitHub cron runs in UTC and has no timezone support, so we schedule BOTH
# 04:00 and 05:00 UTC. The EXPECTED_LOCAL_HOUR=5 guard in the script makes only
# the run that actually lands at 5am UK time post; the other one exits quietly.
#   04:00 UTC = 5am BST (summer)   |   05:00 UTC = 5am GMT (winter)
on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch: {}        # lets you trigger a manual test run from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Persist the previous post's id between runs so it can be deleted.
      # The run-id key never hits on restore, so restore-keys pulls the most
      # recent prior cache, and a fresh cache is always saved at job end.
      - name: Restore last message id
        uses: actions/cache@v5
        with:
          path: last_message_id.txt
          key: forex-last-msg-${{ github.run_id }}
          restore-keys: |
            forex-last-msg-
      - name: Post the brief
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIMEZONE: Europe/London
          EXPECTED_LOCAL_HOUR: "5"
          # Optional overrides:
          # CURRENCIES: "USD,EUR"
          # TRUMP_MAX: "8"
        run: python forex_news_to_discord.py
