name: Morning Forex Brief

# Posts once each morning at ~4am UK. The script's gate posts ONCE per day, only
# at or after 4am UK, so any trigger that fires in the morning window posts -- and
# duplicates are impossible (later triggers see "already posted today" and skip).
#
# PRIMARY  -> repository_dispatch, fired ON TIME by an external scheduler such as
#             cron-job.org. GitHub runs a dispatched workflow within seconds, so
#             the timing is precise -- unlike GitHub's own cron. Runs GATED.
# BACKUP   -> GitHub's schedule (below). Best-effort and often delayed, but if the
#             external trigger ever fails, one of these still posts. Runs GATED.
# MANUAL   -> the "Run workflow" button; posts immediately for testing (forced).
on:
  repository_dispatch:         # PRIMARY: external scheduler hits the GitHub API
    types: [post-brief]
  schedule:                    # BACKUP only: GitHub cron is best-effort / often late
    - cron: "11 3 * * *"
    - cron: "11 4 * * *"
    - cron: "11 5 * * *"
  workflow_dispatch: {}        # manual test run; posts immediately (FORCE_POST below)

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency: forex-brief    # never let two runs race on the saved state
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Carry the saved state (last message id + last posted date) between runs.
      - name: Remember state
        uses: actions/cache@v5
        with:
          path: last_message_id.txt
          key: forex-state-${{ github.run_id }}
          restore-keys: |
            forex-state-

      - name: Post the brief
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIMEZONE: Europe/London
          POST_HOUR: "4"        # 4am UK
          # Manual "Run workflow" tests post immediately; scheduled runs obey the gate.
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          # Optional overrides:
          # CURRENCIES: "USD,EUR"
          # TRUMP_MAX: "8"
        run: python forex_news_to_discord.py
